<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <style type="text/css">
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }

      html {
        display: table;
      }

      body {
        display: table-cell;
        text-align: center;
        vertical-align: middle;
      }

      input {
        width: 300px;
        text-align: center;
      }
    </style>
    <title>アップデート内容</title>
  </head>

  <body>
    <style>
      #attachment label,
      button {
        display: inline-block;
        position: relative;
        background: #666;
        color: #fff;
        font-size: 16px;
        padding: 10px 18px;
        border-radius: 4px;
        transition: all 0.3s;
        outline: none;
      }

      #attachment label:hover,
      button:hover {
        background: #888;
        transition: all 0.4s;
      }

      #attachment label input {
        position: absolute;
        left: 0;
        top: 0;
        opacity: 0;
        width: 100%;
        height: 100%;
      }

      #attachment .filename {
        font-weight: 16px;
        margin: 0 0 0 10px;
      }
    </style>
    <h1 style="margin-top: 40px">～v1.2.2にアップデートしました～</h1>
    <br />
    <br />
    <br />
    <h2>～修正～</h2>
    <h3>不具合の修正をしました</h3>
    <br />
    <hr style="margin-left: 200px; margin-right: 200px" />

    <h2>～今後の機能追加について～</h2>
    <h3>現在気分転換になるRPGを製作中です</h3>

  </body>
</html>
