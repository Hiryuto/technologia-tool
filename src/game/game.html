<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <title>popup</title>
    <style>
        body {
            text-align: center;
            width: 205px;
        }

        hr {
            margin-bottom: 8px;
            margin-top: 8px;
        }

        div#main h2,
        h3 {
            margin: 0px;
        }

        .box {
            position: relative;
            margin: 2em 0;
            padding: 0.5em 1em;
            border: solid 2px #000000;
            border-radius: 8px;
        }

        .box .box-title {
            position: absolute;
            display: inline-block;
            top: -13px;
            left: 10px;
            padding: 7px 9px 0px 5px;
            line-height: 1;
            font-size: 10px;
            background: #FFF;
            color: #000000;
            font-weight: bold;
        }

        .box p {
            margin: 0;
            padding: 0;
            font-size: 15px;
        }
    </style>
</head>

<body>
    <h1>気分転換RPG(仮)</h1>
    <div id="main">
        <div id="status">
            <h2>Level:<span id="level">1</span></h2>
            <h2>Exp:<span id="exp">5</span></h2>
            <div class="box">
                <span class="box-title">パラメーター</span>
                <p>HP: <span id="hp">10</span></p>
                <p>ATK: <span id="atk">10</span></p>
                <p>DEF: <span id="def">10</span></p>
                <p>SPD: <span id="spd">10</span></p>
            </div>
        </div>
        <div id="menu">
            <button>探索をする</button>
            <br>
            <button>スキル設定</button>
            <br>
            <button>インベントリ</button>
            <br>
            <button>設定</button>
            <br>
            <button>ヘルプ</button>
        </div>
    </div>
    <hr>
    <button id="popup">ショートカットメニューに戻る</button>
    <script src="game.js"></script>
</body>

</html>
